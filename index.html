<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯商业终极版（API+充值+后台大屏+APP）</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
.header{padding:12px;display:flex;justify-content:space-between;background:#020617;}
.container{padding:12px;padding-bottom:100px;}
.card{background:#0f172a;margin:10px 0;padding:14px;border-radius:12px;}
.btn{background:#1e293b;padding:8px;border-radius:8px;margin:5px;cursor:pointer;display:inline-block;}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#020617;}
.tab{flex:1;text-align:center;padding:10px;font-size:12px;}
.big{font-size:22px;font-weight:bold;}
</style>
</head>
<body>

<div class="header">
 <div>⚽ 商业终极平台</div>
 <div id="info">未登录</div>
</div>

<div class="container" id="app"></div>

<div class="tabbar">
 <div class="tab" onclick="showPage('match')">比赛</div>
 <div class="tab" onclick="showPage('wallet')">钱包</div>
 <div class="tab" onclick="showPage('dashboard')">大屏</div>
</div>

<script>
const supabase=window.supabase.createClient("https://kdjlnfkcxrndqhrzvbzu.supabase.co","sb_publishable_lS31kXPSB0gs103wQPjlYQ_ta8iFZi9");

let user="demo";
let profitHistory=[];

/* 🌍 模拟真实API数据 */
async function fetchMatches(){
 return [
  {home:"Argentina",away:"France",score:"1-0"},
  {home:"Brazil",away:"England",score:"2-1"}
 ];
}

async function renderMatch(){
 let data=await fetchMatches();
 let html="";
 data.forEach(m=>{
  html+=`<div class='card'>${m.home} vs ${m.away}<br>${m.score}</div>`;
 });
 document.getElementById('app').innerHTML=html;
}

/* 💰 钱包 */
async function renderWallet(){
 let html=`<div class='card'>
 <div class='big'>余额：<span id='money'>0</span></div>
 <div class='btn' onclick='deposit()'>充值 +1000</div>
 <div class='btn' onclick='withdraw()'>提现 -500</div>
 </div>`;
 document.getElementById('app').innerHTML=html;
 loadMoney();
}

async function loadMoney(){
 let {data}=await supabase.from('users').select('*').eq('username',user).single();
 document.getElementById('money').innerText=data?.money||0;
}

async function deposit(){
 let {data}=await supabase.from('users').select('*').eq('username',user).single();
 await supabase.from('users').update({money:data.money+1000}).eq('username',user);
 loadMoney();
}

async function withdraw(){
 let {data}=await supabase.from('users').select('*').eq('username',user).single();
 if(data.money<500) return alert('余额不足');
 await supabase.from('users').update({money:data.money-500}).eq('username',user);
 loadMoney();
}

/* 📊 后台大屏 */
function renderDashboard(){
 document.getElementById('app').innerHTML=`
 <div class='card big'>📊 平台大屏</div>
 <canvas id='chart'></canvas>
 `;
 let ctx=document.getElementById('chart');
 new Chart(ctx,{
  type:'line',
  data:{labels:profitHistory.map((_,i)=>i),datasets:[{label:'盈利',data:profitHistory}]}
 });
}

setInterval(()=>{
 profitHistory.push(Math.floor(Math.random()*500));
},3000);

function showPage(p){
 if(p==='match')renderMatch();
 if(p==='wallet')renderWallet();
 if(p==='dashboard')renderDashboard();
}

showPage('match');
</script>

</body>
</html>
