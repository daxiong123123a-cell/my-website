<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2026世界杯模拟器</title>

<style>
body {
 font-family:Arial;
 background:#061d06;
 color:white;
 text-align:center;
}

h2 { margin-top:20px; }

.group {
 display:inline-block;
 background:#111;
 padding:10px;
 margin:10px;
 border-radius:10px;
}

table {
 border-collapse:collapse;
}

td,th {
 border:1px solid #444;
 padding:5px 10px;
}

button {
 padding:10px 20px;
 margin:20px;
 background:#00ffcc;
 border:none;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>🏆 2026世界杯模拟器</h1>

<button onclick="simulate()">⚽ 模拟全部小组赛</button>

<div id="groups"></div>

<script>

const groups = {
 A:["阿根廷","荷兰","日本","美国"],
 B:["法国","德国","墨西哥","韩国"],
 C:["巴西","葡萄牙","摩洛哥","加拿大"],
 D:["英格兰","意大利","乌拉圭","澳大利亚"],
 E:["西班牙","比利时","瑞士","伊朗"],
 F:["克罗地亚","丹麦","塞尔维亚","埃及"],
 G:["哥伦比亚","智利","秘鲁","尼日利亚"],
 H:["波兰","瑞典","土耳其","沙特"]
};

let table = {};

function init(){
 table = {};
 for(let g in groups){
   table[g] = groups[g].map(t=>({
     name:t, pts:0, gf:0, ga:0
   }));
 }
 render();
}

function match(a,b){
 let g1 = Math.floor(Math.random()*5);
 let g2 = Math.floor(Math.random()*5);

 a.gf+=g1; a.ga+=g2;
 b.gf+=g2; b.ga+=g1;

 if(g1>g2) a.pts+=3;
 else if(g2>g1) b.pts+=3;
 else { a.pts+=1; b.pts+=1; }
}

function simulate(){
 init();

 for(let g in table){
   let t = table[g];

   for(let i=0;i<t.length;i++){
     for(let j=i+1;j<t.length;j++){
       match(t[i],t[j]);
     }
   }

   // 排名
   t.sort((a,b)=>{
     return b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga);
   });
 }

 render();
}

function render(){
 let html = "";

 for(let g in table){
   html += `<div class="group">
   <h2>${g}组</h2>
   <table>
   <tr><th>球队</th><th>分</th><th>进</th><th>失</th></tr>`;

   table[g].forEach(t=>{
     html += `<tr>
       <td>${t.name}</td>
       <td>${t.pts}</td>
       <td>${t.gf}</td>
       <td>${t.ga}</td>
     </tr>`;
   });

   html += "</table></div>";
 }

 document.getElementById("groups").innerHTML = html;
}

init();

</script>

</body>
</html>
