<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯赛事</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f5f7fa;
}

/* 顶部导航 */
.header{
 background:#0b2a5b;
 color:white;
 padding:10px 20px;
 display:flex;
 justify-content:space-between;
}

.menu span{
 margin-right:20px;
 cursor:pointer;
}

/* 布局 */
.container{
 display:flex;
}

.left{
 width:70%;
 padding:10px;
}

.right{
 width:30%;
 background:#eee;
 padding:10px;
}

/* 比赛卡片 */
.match{
 background:white;
 padding:10px;
 margin-bottom:10px;
 border-radius:8px;
}

.row{
 display:flex;
 align-items:center;
 justify-content:space-between;
}

.team{
 width:120px;
}

/* 赔率按钮 */
.odds{
 display:flex;
 gap:5px;
}

.box{
 background:#f1f1f1;
 padding:8px;
 border-radius:5px;
 text-align:center;
 width:60px;
 cursor:pointer;
}

.box:hover{
 background:#00ffcc;
 color:black;
}

/* 右侧 */
.ad{
 background:#222;
 color:white;
 height:150px;
 margin-bottom:10px;
 display:flex;
 align-items:center;
 justify-content:center;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="header">
 <div class="menu">
  <span>⚽ 首页</span>
  <span>热门</span>
  <span>今日</span>
  <span>世界杯2026</span>
 </div>
 <div>💰 余额：0.76</div>
</div>

<div class="container">

<!-- 左边 -->
<div class="left">

<h3>世界杯2026（美加墨）</h3>

<div class="match">
 <div class="row">
  <div class="team">墨西哥</div>
  <div class="odds">
    <div class="box">主 1.51</div>
    <div class="box">和 4.05</div>
    <div class="box">客 5.80</div>
  </div>
 </div>

 <div class="row">
  <div class="team">南非</div>
  <div>06-11 15:00</div>
 </div>
</div>

<div class="match">
 <div class="row">
  <div class="team">韩国</div>
  <div class="odds">
    <div class="box">主 2.72</div>
    <div class="box">和 3.05</div>
    <div class="box">客 2.61</div>
  </div>
 </div>

 <div class="row">
  <div class="team">捷克</div>
  <div>06-11 22:00</div>
 </div>
</div>

</div>

<!-- 右边 -->
<div class="right">

<div class="ad">🎮 广告位</div>
<div class="ad">📱 预约投注</div>

</div>

</div>

</body>
</html>
