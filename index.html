<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯投注系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b3d0b;
  color:white;
  text-align:center;
}
.nav{
  background:black;
  padding:10px;
}
.box{
  margin:20px;
}
button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}
.match{
  border:1px solid white;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="nav">⚽ 世界杯投注系统</div>

<div class="box">
  用户名：<input id="username">
  <button onclick="login()">登录</button>
</div>

<div>余额：<span id="money">0</span></div>

<div id="matches"></div>

<script>

// 🔥 填这里
const supabaseClient = supabase.createClient(
  "https://kdjlnfkcxrndqhrzvbzu.supabase.co",
  "👉这里粘你的 publishable key"
);

let currentUser = null;

// 登录
async function login(){
  const username = document.getElementById("username").value;

  let { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("username", username);

  if(data.length === 0){
    await supabaseClient.from("users").insert([
      { username: username, money: 1000 }
    ]);
    alert("新用户已创建！");
    loadUser(username);
  }else{
    loadUser(username);
  }
}

// 加载用户
async function loadUser(username){
  currentUser = username;

  let { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("username", username)
    .single();

  document.getElementById("money").innerText = data.money;
}

// 比赛数据
const matches = [
  {name:"阿根廷 vs 法国"},
  {name:"巴西 vs 英格兰"}
];

// 显示比赛
function renderMatches(){
  const div = document.getElementById("matches");
  div.innerHTML = "";

  matches.forEach(m=>{
    div.innerHTML += `
      <div class="match">
        ${m.name}<br>
        <button onclick="bet('${m.name}','主')">主胜</button>
        <button onclick="bet('${m.name}','客')">客胜</button>
      </div>
    `;
  });
}

// 投注
async function bet(match, choice){
  if(!currentUser){
    alert("请先登录");
    return;
  }

  let amount = 100;

  let { data:user } = await supabaseClient
    .from("users")
    .select("*")
    .eq("username", currentUser)
    .single();

  if(user.money < amount){
    alert("余额不足");
    return;
  }

  // 扣钱
  await supabaseClient
    .from("users")
    .update({ money: user.money - amount })
    .eq("username", currentUser);

  // 记录投注
  await supabaseClient.from("bets").insert([
    {
      username: currentUser,
      match: match,
      amount: amount,
      choice: choice
    }
  ]);

  alert("下注成功！");
  loadUser(currentUser);
}

renderMatches();

</script>

</body>
</html>
