<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯投注平台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  background:#1e293b;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.balance{
  color:#22c55e;
}

.container{
  padding:10px;
}

.match{
  background:#1e293b;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
}

.teams{
  font-size:18px;
  margin-bottom:10px;
}

.odds{
  display:flex;
  gap:10px;
}

.odd-btn{
  flex:1;
  background:#334155;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.odd-btn:hover{
  background:#22c55e;
  color:black;
}

.login{
  padding:10px;
}

input{
  padding:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>⚽ 世界杯投注平台</div>
  <div class="balance">余额: <span id="money">0</span></div>
</div>

<div class="login">
  用户名: <input id="username">
  <button onclick="login()">登录</button>
</div>

<div class="container" id="matches"></div>

<script>

const supabaseClient = supabase.createClient(
  "https://你的URL",
  "你的KEY"
);

let currentUser = null;

const matches = [
  {teams:"阿根廷 vs 法国", odds:[1.5,3.2,5.0]},
  {teams:"巴西 vs 英格兰", odds:[1.8,3.0,4.2]}
];

function render(){
  const el = document.getElementById("matches");
  el.innerHTML = "";

  matches.forEach(m=>{
    el.innerHTML += `
    <div class="match">
      <div class="teams">${m.teams}</div>
      <div class="odds">
        <div class="odd-btn" onclick="bet('${m.teams}','主',${m.odds[0]})">主 ${m.odds[0]}</div>
        <div class="odd-btn" onclick="bet('${m.teams}','平',${m.odds[1]})">平 ${m.odds[1]}</div>
        <div class="odd-btn" onclick="bet('${m.teams}','客',${m.odds[2]})">客 ${m.odds[2]}</div>
      </div>
    </div>
    `;
  });
}

async function login(){
  const username = document.getElementById("username").value;

  let { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("username", username);

  if(data.length === 0){
    await supabaseClient.from("users").insert([
      { username: username, money: 1000 }
    ]);
  }

  currentUser = username;
  loadUser();
}

async function loadUser(){
  let { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("username", currentUser)
    .single();

  document.getElementById("money").innerText = data.money;
}

async function bet(match, choice, odd){
  if(!currentUser){
    alert("请先登录");
    return;
  }

  let amount = 100;

  let { data:user } = await supabaseClient
    .from("users")
    .select("*")
    .eq("username", currentUser)
    .single();

  if(user.money < amount){
    alert("余额不足");
    return;
  }

  await supabaseClient
    .from("users")
    .update({ money: user.money - amount })
    .eq("username", currentUser);

  await supabaseClient.from("bets").insert([
    {
      username: currentUser,
      match: match,
      amount: amount,
      choice: choice,
      odd: odd
    }
  ]);

  alert("下注成功");
  loadUser();
}

render();

</script>

</body>
</html>
