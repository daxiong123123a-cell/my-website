<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯投注平台</title>

<style>
body { margin:0; font-family:Arial; background:#0b3d0b; color:white; text-align:center;}
.nav { background:black; padding:15px; font-size:20px; }
.box { margin:15px; }

button {
  padding:10px 15px;
  background:#00ffcc;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
input {
  padding:8px;
}
</style>

</head>

<body>

<div class="nav">⚽ 世界杯竞猜系统</div>

<div class="box">
  👤 用户：
  <input id="username" placeholder="输入用户名">
  <button onclick="login()">登录</button>
</div>

<div class="box">
  💰 余额：<span id="money">0</span>
</div>

<div class="box">
  <h3>阿根廷 vs 法国</h3>
  <button onclick="bet('阿根廷vs法国','阿根廷',100)">阿根廷 +100</button>
  <button onclick="bet('阿根廷vs法国','法国',100)">法国 +100</button>
</div>

<!-- 👇 放在body最底部 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔥 替换成你的
const supabase = supabase.createClient(
  "你的Project URL",
  "你的anon key"
);

// 登录 / 注册
async function login(){
  let username = document.getElementById("username").value;

  let { data } = await supabase
    .from('users')
    .select('*')
    .eq('username', username)
    .single();

  if(!data){
    await supabase.from('users').insert([
      { username: username, money: 1000 }
    ]);
    alert("新用户创建成功！送1000");
  }

  localStorage.setItem("user", username);
  loadUser();
}

// 读取余额
async function loadUser(){
  let username = localStorage.getItem("user");
  if(!username) return;

  let { data } = await supabase
    .from('users')
    .select('*')
    .eq('username', username)
    .single();

  document.getElementById("money").innerText = data.money;
}

// 投注
async function bet(match, choice, amount){
  let username = localStorage.getItem("user");

  if(!username){
    alert("请先登录！");
    return;
  }

  let { data } = await supabase
    .from('users')
    .select('*')
    .eq('username', username)
    .single();

  if(data.money < amount){
    alert("余额不足！");
    return;
  }

  // 扣钱
  await supabase
    .from('users')
    .update({ money: data.money - amount })
    .eq('username', username);

  // 记录投注
  await supabase.from('bets').insert([
    {
      username: username,
      match: match,
      amount: amount,
      choice: choice
    }
  ]);

  alert("下注成功！");
  loadUser();
}

// 自动加载
loadUser();

</script>

</body>
</html>
