<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>懂球帝风格 · 实时比分</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont;background:#f5f6f8;color:#111}
.header{padding:12px;background:#fff;font-weight:600;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
.balance{color:#16a34a}
.container{padding:10px;padding-bottom:80px}
.card{background:#fff;margin:10px 0;padding:12px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.row{display:flex;align-items:center;justify-content:space-between}
.team{display:flex;align-items:center;gap:6px;font-size:14px}
.team img{width:20px;height:14px;border-radius:2px}
.score{font-size:18px;font-weight:700}
.status{font-size:12px;color:#6b7280;margin-top:4px}
.live{color:#ef4444;font-weight:bold}
.time{color:#ef4444;font-size:12px;margin-left:6px}
.odds{display:flex;gap:6px;margin-top:8px}
.btn{flex:1;background:#f1f5f9;padding:6px;border-radius:6px;text-align:center;font-size:12px;cursor:pointer}
.btn:hover{background:#16a34a;color:#fff}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#fff;border-top:1px solid #e5e7eb}
.tab{flex:1;text-align:center;padding:10px;font-size:12px}
.modal{position:fixed;bottom:0;width:100%;background:#fff;padding:16px;display:none;border-radius:16px 16px 0 0;box-shadow:0 -2px 10px rgba(0,0,0,.2)}
</style>
</head>
<body>

<div class="header">
  <div>⚽ 实时比分</div>
  <div class="balance">💰<span id="money">0</span></div>
</div>

<div class="container" id="app">加载中...</div>

<div class="tabbar">
  <div class="tab" onclick="showPage('home')">比赛</div>
  <div class="tab" onclick="showPage('record')">记录</div>
  <div class="tab" onclick="showPage('user')">我的</div>
</div>

<div class="modal" id="betModal">
 <h3 id="betTitle"></h3>
 <div class="btn" onclick="confirmBet(100)">下注100</div>
 <div class="btn" onclick="confirmBet(500)">下注500</div>
</div>

<script>
const SUPABASE_URL="https://kdjlnfkcxrndqhrzvbzu.supabase.co";
const SUPABASE_KEY="sb_publishable_lS31kXPSB0gs103wQPjlYQ_ta8iFZi9";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let user=null;
let matches=[];
let currentBet=null;

function flagUrl(code){return `https://flagcdn.com/w40/${code}.png`;}

async function loadMatches(){
 try{
  let res=await fetch("https://corsproxy.io/?https://api.football-data.org/v4/matches",{
    headers:{"X-Auth-Token":"e277c86671ab49eda6a7396988490887"}
  });
  let data=await res.json();
  matches=(data.matches||[]).slice(0,10);
 }catch(e){
  document.getElementById('app').innerHTML='加载失败';
 }
 renderHome();
}

function showPage(p){
 if(p==='home')renderHome();
 if(p==='record')renderRecord();
 if(p==='user')renderUser();
}

function renderHome(){
 let html="";
 matches.forEach((m,i)=>{
  let home=m.homeTeam.name;
  let away=m.awayTeam.name;
  let score=m.score.fullTime.home!==null?`${m.score.fullTime.home}-${m.score.fullTime.away}`:'VS';
  let live=m.status==='LIVE'?'<span class="live">LIVE</span><span class="time">'+Math.floor(Math.random()*90)+'\''+'</span>':m.status;

  let odd1=(1.5+Math.random()).toFixed(2);
  let odd2=(1.5+Math.random()).toFixed(2);

  html+=`<div class='card'>
   <div class='row'>
    <div class='team'>🏳 ${home}</div>
    <div class='score'>${score}</div>
    <div class='team'>${away} 🏳</div>
   </div>
   <div class='status'>${live}</div>
   <div class='odds'>
    <div class='btn' onclick="openBet(${i},'主胜',${odd1})">主 ${odd1}</div>
    <div class='btn' onclick="openBet(${i},'客胜',${odd2})">客 ${odd2}</div>
   </div>
  </div>`;
 });
 document.getElementById('app').innerHTML=html;
}

function openBet(i,type,odd){
 if(!user) return alert('请先登录');
 currentBet={i,type,odd};
 document.getElementById('betTitle').innerText=type+" @"+odd;
 document.getElementById('betModal').style.display='block';
}

async function confirmBet(amount){
 let {data:u}=await supabase.from('users').select('*').eq('username',user).single();
 if(u.money<amount) return alert('余额不足');

 await supabase.from('users').update({money:u.money-amount}).eq('username',user);
 await supabase.from('bets').insert([{username:user,amount:amount,choice:currentBet.type}]);

 document.getElementById('betModal').style.display='none';
 loadUser();
 alert('下注成功');
}

async function renderRecord(){
 let {data}=await supabase.from('bets').select('*').eq('username',user);
 let html="";
 (data||[]).forEach(b=> html+=`<div class='card'>${b.choice} ￥${b.amount}</div>`);
 document.getElementById('app').innerHTML=html||"暂无记录";
}

function renderUser(){
 document.getElementById('app').innerHTML=`用户名:<input id='u'><button onclick='login()'>登录</button>`;
}

async function login(){
 let name=document.getElementById('u').value;
 let {data}=await supabase.from('users').select('*').eq('username',name);
 if(!data.length) await supabase.from('users').insert([{username:name,money:1000}]);
 user=name;loadUser();alert('登录成功');
}

async function loadUser(){
 let {data}=await supabase.from('users').select('*').eq('username',user).single();
 document.getElementById('money').innerText=data?.money||0;
}

loadMatches();
</script>

</body>
</html>
