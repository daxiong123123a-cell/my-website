<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯投注系统（修复版）</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
.header{padding:12px;display:flex;justify-content:space-between;background:#020617;}
.balance{color:#22c55e;}
.container{padding:12px;padding-bottom:90px;}
.card{background:#0f172a;margin:10px 0;padding:14px;border-radius:14px;}
.odds{display:flex;gap:10px;margin-top:10px;}
.btn{flex:1;background:#1e293b;padding:12px;border-radius:10px;text-align:center;cursor:pointer;}
.btn:hover{background:#22c55e;color:black;}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#020617;border-top:1px solid #1e293b;}
.tab{flex:1;text-align:center;padding:10px;font-size:12px;}
.modal{position:fixed;bottom:0;left:0;width:100%;background:#0f172a;border-radius:20px 20px 0 0;padding:20px;display:none;}
.amounts{display:flex;gap:10px;margin:10px 0;}
.amounts div{flex:1;background:#1e293b;padding:10px;text-align:center;border-radius:8px;cursor:pointer;}
.confirm{background:#22c55e;color:black;padding:12px;text-align:center;border-radius:10px;margin-top:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
  <div>⚽ 世界杯</div>
  <div class="balance">💰<span id="money">0</span></div>
</div>

<div class="container" id="app"></div>

<div class="tabbar">
  <div class="tab" onclick="showPage('home')">首页</div>
  <div class="tab" onclick="showPage('rank')">排行</div>
  <div class="tab" onclick="showPage('record')">记录</div>
  <div class="tab" onclick="showPage('user')">我的</div>
</div>

<div class="modal" id="betModal">
 <h3 id="betTitle"></h3>
 <div class="amounts">
  <div onclick="selectAmount(100)">100</div>
  <div onclick="selectAmount(500)">500</div>
  <div onclick="selectAmount(1000)">1000</div>
 </div>
 <div class="confirm" onclick="confirmBet()">确认下注</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://kdjlnfkcxrndqhrzvbzu.supabase.co";
const SUPABASE_KEY = "sb_publishable_lS31kXPSB0gs103wQPjlYQ_ta8iFZi9";

const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

let user=null;
let currentBet=null;

let matches=[
 {teams:"阿根廷 vs 法国",odds:{home:1.8,away:2.0}},
 {teams:"巴西 vs 英格兰",odds:{home:1.6,away:2.3}}
];

window.showPage = function(p){
 if(p==='home')renderHome();
 if(p==='rank')renderRank();
 if(p==='record')renderRecord();
 if(p==='user')renderUser();
}

setInterval(()=>{
 matches.forEach(m=>{
   m.odds.home=(+m.odds.home+(Math.random()-0.5)*0.1).toFixed(2);
   m.odds.away=(+m.odds.away+(Math.random()-0.5)*0.1).toFixed(2);
 });
 renderHome();
},3000);

function renderHome(){
 let html="";
 matches.forEach((m,i)=>{
  html+=`<div class='card'>
    <div>${m.teams}</div>
    <div class='odds'>
      <div class='btn' onclick="openBet(${i},'主胜',${m.odds.home})">主 ${m.odds.home}</div>
      <div class='btn' onclick="openBet(${i},'客胜',${m.odds.away})">客 ${m.odds.away}</div>
    </div>
  </div>`;
 });
 document.getElementById('app').innerHTML=html;
}

window.openBet = function(i,choice,odd){
 if(!user) return alert('请先登录');
 currentBet={i,choice,odd,amount:0};
 document.getElementById('betTitle').innerText=choice+" @"+odd;
 document.getElementById('betModal').style.display='block';
}

window.selectAmount = function(a){
 currentBet.amount=a;
}

window.confirmBet = async function(){
 if(!currentBet.amount) return alert('请选择金额');

 let {data:u}=await supabaseClient.from('users').select('*').eq('username',user).single();
 if(!u || u.money<currentBet.amount) return alert('余额不足');

 await supabaseClient.from('users').update({money:u.money-currentBet.amount}).eq('username',user);
 await supabaseClient.from('bets').insert([{
  username:user,
  match:matches[currentBet.i].teams,
  choice:currentBet.choice,
  odd:currentBet.odd,
  amount:currentBet.amount
 }]);

 document.getElementById('betModal').style.display='none';
 loadUser();
 alert('下注成功');
}

async function loadUser(){
 let {data}=await supabaseClient.from('users').select('*').eq('username',user).single();
 document.getElementById('money').innerText=data?.money||0;
}

async function renderRank(){
 let {data}=await supabaseClient.from('users').select('*').order('money',{ascending:false});
 let html="<div class='card'>排行榜</div>";
 (data||[]).forEach((u,i)=> html+=`<div class='card'>${i+1}. ${u.username} 💰${u.money}</div>`);
 document.getElementById('app').innerHTML=html;
}

async function renderRecord(){
 let {data}=await supabaseClient.from('bets').select('*').eq('username',user);
 let html="";
 (data||[]).forEach(b=> html+=`<div class='card'>${b.match} ${b.choice} ￥${b.amount}</div>`);
 document.getElementById('app').innerHTML=html;
}

function renderUser(){
 document.getElementById('app').innerHTML=`用户名:<input id='u'><button onclick='login()'>登录</button>`;
}

window.login = async function(){
 let name=document.getElementById('u').value;
 let {data}=await supabaseClient.from('users').select('*').eq('username',name);
 if(!data || data.length===0){await supabaseClient.from('users').insert([{username:name,money:1000}]);}
 user=name;loadUser();alert('登录成功');
}

showPage('home');
</script>

</body>
</html>
