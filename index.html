<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>世界杯投注系统（完整版）</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
.header{padding:12px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.6);position:sticky;top:0;}
.balance{color:#22c55e;}
.container{padding:12px;padding-bottom:80px;}
.card{background:#0f172a;margin:10px 0;padding:12px;border-radius:12px;}
.odds{display:flex;gap:10px;margin-top:10px;}
.btn{flex:1;background:#1e293b;padding:10px;border-radius:8px;text-align:center;cursor:pointer;}
.btn:hover{background:#22c55e;color:black;}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#020617;}
.tab{flex:1;text-align:center;padding:10px;}
</style>
</head>

<body>

<div class="header">
  <div>⚽ 世界杯</div>
  <div class="balance">💰<span id="money">0</span></div>
</div>

<div class="container" id="app"></div>

<div class="tabbar">
  <div class="tab" onclick="showPage('home')">首页</div>
  <div class="tab" onclick="showPage('rank')">排行</div>
  <div class="tab" onclick="showPage('record')">记录</div>
  <div class="tab" onclick="showPage('user')">我的</div>
</div>

<script>
// ✅ 改成你自己的
const SUPABASE_URL = "https://你的项目.supabase.co";
const SUPABASE_KEY = "你的publishable key";

if(!SUPABASE_URL || !SUPABASE_KEY || SUPABASE_URL.includes("你的项目")){
 alert("请先填写 Supabase URL 和 KEY");
}

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user = null;

let matches = [
 {teams:"阿根廷 vs 法国",odds:{home:1.8,away:2.0}},
 {teams:"巴西 vs 英格兰",odds:{home:1.6,away:2.3}}
];

function showPage(p){
 if(p==='home')renderHome();
 if(p==='rank')renderRank();
 if(p==='record')renderRecord();
 if(p==='user')renderUser();
}

// 实时赔率
setInterval(()=>{
 matches.forEach(m=>{
   m.odds.home=(+m.odds.home+(Math.random()-0.5)*0.1).toFixed(2);
   m.odds.away=(+m.odds.away+(Math.random()-0.5)*0.1).toFixed(2);
 });
 renderHome();
},3000);

function renderHome(){
 let html="";
 matches.forEach((m,i)=>{
  html+=`<div class='card'>
    <div>${m.teams}</div>
    <div class='odds'>
      <div class='btn' onclick="bet(${i},'主胜',${m.odds.home})">主 ${m.odds.home}</div>
      <div class='btn' onclick="bet(${i},'客胜',${m.odds.away})">客 ${m.odds.away}</div>
    </div>
  </div>`;
 });
 document.getElementById('app').innerHTML=html;
}

async function bet(i,choice,odd){
 if(!user) return alert('请先登录');
 let amount = parseInt(prompt('下注金额'));
 if(!amount) return;

 let {data:u} = await supabaseClient.from('users').select('*').eq('username',user).single();
 if(!u) return alert('用户不存在');
 if(u.money < amount) return alert('余额不足');

 await supabaseClient.from('users').update({money:u.money-amount}).eq('username',user);
 await supabaseClient.from('bets').insert([{username:user,match:matches[i].teams,choice,odd,amount}]);

 loadUser();
 alert('下注成功');
}

async function loadUser(){
 let {data} = await supabaseClient.from('users').select('*').eq('username',user).single();
 if(data) document.getElementById('money').innerText = data.money;
}

async function renderRank(){
 let {data} = await supabaseClient.from('users').select('*').order('money',{ascending:false});
 let html="<div class='card'>排行榜</div>";
 (data||[]).forEach((u,i)=>{
  html+=`<div class='card'>${i+1}. ${u.username} 💰${u.money}</div>`;
 });
 document.getElementById('app').innerHTML=html;
}

async function renderRecord(){
 let {data} = await supabaseClient.from('bets').select('*').eq('username',user);
 let html="";
 (data||[]).forEach(b=>{
  html+=`<div class='card'>
    ${b.match} ${b.choice} ￥${b.amount}
    <br>状态：${b.status || '未开奖'}
    <br>赢：${b.win_amount || 0}
  </div>`;
 });
 document.getElementById('app').innerHTML=html;
}

function renderUser(){
 document.getElementById('app').innerHTML = `
 用户名:<input id='u'>
 <button onclick='login()'>登录</button>
 <hr>
 <h3>🎮 后台控制（测试用）</h3>
 <button onclick="settleBets('主胜')">开奖：主胜</button>
 <button onclick="settleBets('客胜')">开奖：客胜</button>
 `;
}

async function login(){
 let name = document.getElementById('u').value;
 if(!name) return;

 let {data} = await supabaseClient.from('users').select('*').eq('username',name);

 if(!data || data.length===0){
   await supabaseClient.from('users').insert([{username:name,money:1000}]);
 }

 user = name;
 loadUser();
 alert('登录成功');
}

// 开奖系统
async function settleBets(result){
 let {data:bets} = await supabaseClient.from('bets').select('*').eq('status','未开奖');

 for(let b of bets || []){
   let win = b.choice === result;
   let winMoney = win ? b.amount * b.odd : 0;

   await supabaseClient.from('bets')
     .update({status:'已开奖', win_amount:winMoney})
     .eq('id',b.id);

   if(win){
     let {data:userData} = await supabaseClient.from('users').select('*').eq('username',b.username).single();
     await supabaseClient.from('users')
       .update({money:userData.money + winMoney})
       .eq('username',b.username);
   }
 }

 alert('开奖完成：'+result);
}

showPage('home');
</script>

</body>
</html>
