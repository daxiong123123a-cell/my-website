<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>足球阵容（高级版）</title>

<style>
body {
 margin:0;
 font-family:Arial;
 background:#061d06;
 color:white;
 text-align:center;
}

.nav {
 background:black;
 padding:10px;
}

.select {
 cursor:pointer;
 padding:10px;
}

.pitch {
 position:relative;
 width:360px;
 height:520px;
 background:#0a5c0a;
 border:2px solid #fff;
 border-radius:15px;
 margin:20px auto;
}

/* 卡片容器 */
.card-wrap {
 position:absolute;
 transform:translate(-50%,-50%);
 width:70px;
 height:100px;
 perspective:800px;
}

/* 卡片 */
.card {
 width:100%;
 height:100%;
 position:relative;
 transform-style:preserve-3d;
 transition:0.6s;
}

.card.flip {
 transform:rotateY(180deg);
}

/* 正反面 */
.face {
 position:absolute;
 width:100%;
 height:100%;
 border-radius:10px;
 backface-visibility:hidden;
}

/* 正面 */
.front {
 background:linear-gradient(135deg,#111,#333);
 box-shadow:0 0 10px #00ffcc;
 text-align:center;
 padding:5px;
}

/* 背面 */
.back {
 background:#111;
 transform:rotateY(180deg);
 font-size:12px;
 padding:5px;
}

/* 头像 */
.card img {
 width:40px;
 height:40px;
 border-radius:50%;
 border:2px solid #00ffcc;
}

.name {
 font-size:12px;
}

.rating {
 color:#00ffcc;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="nav">⚽ 足球阵容（高级UI）</div>

<div class="select" onclick="showTeam('a')">阿根廷</div>
<div class="select" onclick="showTeam('b')">法国</div>

<div id="pitch" class="pitch"></div>

<script>

function avatar(name){
 return "https://ui-avatars.com/api/?name="+name+"&background=00ffcc&color=000";
}

const teams = {
 a: [
  {name:'梅西',rating:93,x:50,y:20},
  {name:'迪马利亚',rating:88,x:20,y:30},
  {name:'劳塔罗',rating:87,x:80,y:30},
  {name:'恩佐',rating:86,x:50,y:50},
  {name:'德保罗',rating:84,x:30,y:60},
  {name:'麦卡利斯特',rating:85,x:70,y:60},
  {name:'后卫1',rating:82,x:20,y:75},
  {name:'后卫2',rating:83,x:40,y:80},
  {name:'后卫3',rating:84,x:60,y:80},
  {name:'后卫4',rating:82,x:80,y:75},
  {name:'门将',rating:85,x:50,y:92}
 ],
 b: [
  {name:'姆巴佩',rating:92,x:50,y:20},
  {name:'登贝莱',rating:86,x:20,y:30},
  {name:'吉鲁',rating:85,x:80,y:30},
  {name:'格列兹曼',rating:88,x:50,y:50},
  {name:'琼阿梅尼',rating:86,x:30,y:60},
  {name:'拉比奥',rating:84,x:70,y:60},
  {name:'后卫A',rating:83,x:20,y:75},
  {name:'后卫B',rating:86,x:40,y:80},
  {name:'后卫C',rating:84,x:60,y:80},
  {name:'后卫D',rating:85,x:80,y:75},
  {name:'门将',rating:87,x:50,y:92}
 ]
};

function showTeam(key){
 const pitch = document.getElementById("pitch");
 pitch.innerHTML = "";

 teams[key].forEach(p=>{
  const wrap = document.createElement("div");
  wrap.className = "card-wrap";
  wrap.style.left = p.x+"%";
  wrap.style.top = p.y+"%";

  wrap.innerHTML = `
   <div class="card" onclick="this.classList.toggle('flip')">
     <div class="face front">
       <div class="rating">${p.rating}</div>
       <img src="${avatar(p.name)}">
       <div class="name">${p.name}</div>
     </div>
     <div class="face back">
       <div>${p.name}</div>
       <div>评分：${p.rating}</div>
       <div>位置：球员</div>
     </div>
   </div>
  `;

  pitch.appendChild(wrap);
 });
}

// 默认显示
showTeam('a');

</script>

</body>
</html>
